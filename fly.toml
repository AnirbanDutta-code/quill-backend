# fly.toml app configuration generated for quill-backend

app = "quill-backend"
primary_region = "sjc"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "5s"
interval = 10000
method = "GET"
path = "/"
protocol = "http"
timeout = 5000
tls_skip_verify = false

[env.production]
# Add production-specific environment variables here if needed
# EXAMPLE: LOG_LEVEL = "info"

[vm]
cpu_kind = "shared"
cpus = 1
memory_mb = 512
